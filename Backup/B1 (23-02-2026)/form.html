<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Abhinav Raj</title>
</head>
<body>
<div>
    <h1>Inquiry Form</h1>
    <form action = "" method = "POST">
        <label for= "name">Name:</label>
        <input type= "text" id = "name" name = "name"
        placeholder = "Enter your name">
        <label for = "email">Email:</label>
        <input type = "email" id = "email" name = "email"
        placeholder = "Enter your email">
        <label for = "phone">Phone:</label>
        <input type = "tel" id = "phone" name = "phone"
        placeholder = "Enter your phone number">
        <label for = "service">Service:</label>
        <select id = "service" name = "service">
            <option value = "" disabled selected>What Service you are looking for?</option>
            <option value = "web-development">website Development</option>
            <option value = "graphic-design">Graphic Design</option>
            <option value = "a&m">Animation & 3D-Modelling</option>
            <option value = "i&v">Image & Video Editing</option>
            <option value = "Not Sure">Not Sure(need guidance yet)</option>
        </select>
        <label for = "message">Message:</label>
        <textarea id = "message" name = "message"
        placeholder="Briefly describe your project"></textarea>
         <label for = "message">Message:</label>
        <textarea id = "reference" name = "reference"
        placeholder="Do you have any reference or inspiration?"></textarea>
        <select id = "timeline" name = "timeline">
            <option value = "" disabled selected>Expected timeline</option>
            <option value = "Urgent">Urgent (within 1 week)</option>
            <option value = "1-2 weeks">1 - 2 weeks</option>
            <option value = "1 month">1 month</option>
            <option value = "Flexible">Flexible/Not Sure</option>
        </select>
        <button type = "submit">Submit</button>
    </form>

</div>
</body>
</html>
